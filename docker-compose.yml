services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - dokploy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_PROJECT_ID=${POSTHOG_PROJECT_ID}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://us.i.posthog.com}
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://sprxenroll-iq-enrolliqstack-jdkjdt-3d5171-72-60-20-16.traefik.me","https://sprxenroll-iq-enrolliqstack-jdkjdt-3d5171-72-60-20-16.traefik.me"]
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
